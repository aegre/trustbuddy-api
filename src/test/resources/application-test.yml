# Test profile — infrastructure provided by Testcontainers @ServiceConnection.
# Placeholder host/port values below are overridden at runtime by container connections.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: create-drop
  task:
    scheduling:
      enabled: false

app:
  auth:
    username: test-user
    password: test-password
  jwt:
    secret: test-jwt-secret-at-least-32-characters-long
  cors:
    allowed-origins: http://localhost:5173
  insurer:
    gateway:
      url: https://httpstat.us/200
  quote:
    draft-expiration-minutes: 30
    expiration-job-interval-ms: 60000

logging:
  level:
    com.trustbuddy: WARN
    org.springframework: WARN
