# Local development — use with: make infra-up && make run

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trustbuddy
    username: trustbuddy
    password: ${POSTGRES_PASSWORD:trustbuddy}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9094

app:
  auth:
    username: ${AUTH_USERNAME:dev-user}
    password: ${AUTH_PASSWORD:dev-password}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-use-at-least-32-characters}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  insurer:
    gateway:
      url: ${INSURER_GATEWAY_URL:https://tools-httpstatus.pickup-services.com/200}

logging:
  level:
    com.trustbuddy: DEBUG
    org.springframework.web: INFO
